<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto Add 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#0f0f0f;color:#fff;}
.container{max-width:900px;margin:auto;padding:15px;}
section{background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:15px;}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#222;
  color:#fff;
}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.success{color:#00ff7f;}
.failed{color:#ff4c4c;}
.skipped{color:orange;}

.console{
  background:#000;
  height:140px;
  overflow:auto;
  padding:10px;
  font-size:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #333;
  padding:6px;
  font-size:13px;
}

th{background:#222;}

.badge{
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
}

.active{background:#00c853;}
.error{background:#ff4c4c;}
.floodwait{background:orange;color:#000;}
</style>
</head>

<body>
<div class="container">

<!-- ================= AUTO ADD ================= -->
<section>
  <h2>🚀 Auto Add Members</h2>

  <textarea id="source" placeholder="@username or link (one per line)"></textarea>
  <input id="target" placeholder="Target Group">

  <button id="start">START</button>

  <div>
    ✅ Success: <span id="success">0</span> |
    ❌ Failed: <span id="failed">0</span> |
    ⏭️ Skipped: <span id="skipped">0</span>
  </div>

  <div class="console" id="console"></div>
  <ul id="list"></ul>
</section>

<!-- ================= ACCOUNTS STATUS ================= -->
<section>
  <h2>📊 Accounts Status</h2>
  <button onclick="loadAccounts()">Refresh Accounts</button>

  <table>
    <thead>
      <tr>
        <th>Phone</th>
        <th>Status</th>
        <th>Flood Until</th>
        <th>Last Used</th>
      </tr>
    </thead>
    <tbody id="accBody"></tbody>
  </table>
</section>

<!-- ================= HISTORY ================= -->
<section>
  <h2>📜 History</h2>
  <button onclick="loadHistory()">Refresh History</button>

  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Status</th>
        <th>Account</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="historyBody"></tbody>
  </table>
</section>

</div>

<script>

const list=document.getElementById("list");
const consoleBox=document.getElementById("console");

function log(msg,color){
  const li=document.createElement("li");
  li.innerText=msg;
  if(color) li.style.color=color;
  list.appendChild(li);
  consoleBox.innerHTML += msg+"<br>";
  consoleBox.scrollTop = consoleBox.scrollHeight;
}

// ================= ACCOUNTS =================
async function loadAccounts(){
  const res = await fetch("/account-status"); // backend memory only
  const data = await res.json();

  const body = document.getElementById("accBody");
  body.innerHTML="";

  Object.values(data).forEach(a=>{

    let statusClass = a.status;

    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${a.phone}</td>
      <td><span class="badge ${statusClass}">${a.status}</span></td>
      <td>${a.floodWaitUntil ? new Date(a.floodWaitUntil).toLocaleString() : "-"}</td>
      <td>${a.lastUsed ? new Date(a.lastUsed).toLocaleString() : "-"}</td>
    `;
    body.appendChild(tr);
  });
}

// ================= HISTORY =================
async function loadHistory(){
  const res = await fetch("/history");
  const data = await res.json();

  const body = document.getElementById("historyBody");
  body.innerHTML="";

  Object.values(data).forEach(h=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${h.username || h.user_id}</td>
      <td class="${h.status}">${h.status}</td>
      <td>${h.accountUsed || "-"}</td>
      <td>${new Date(h.timestamp).toLocaleString()}</td>
    `;
    body.appendChild(tr);
  });
}

// ================= ADD MEMBER =================
async function addMember(member){
  const res = await fetch("/add-member",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(member)
  });
  return await res.json();
}

// ================= START =================
document.getElementById("start").onclick = async ()=>{

  const source=document.getElementById("source").value.trim().split("\n");
  const target=document.getElementById("target").value.trim();

  if(!target) return alert("Enter target group");

  let success=0,failed=0,skipped=0;

  for(const user of source){

    if(!user) continue;

    log("Processing "+user,"cyan");

    try{
      const res = await addMember({
        username:user,
        targetGroup:target
      });

      if(res.status==="success"){
        success++;
        log("SUCCESS "+user,"lime");
      }
      else if(res.status==="skipped"){
        skipped++;
        log("SKIPPED "+user,"orange");
      }
      else{
        failed++;
        log("FAILED "+user,"red");
      }

    }catch(e){
      failed++;
      log("ERROR "+user,"red");
    }

    await new Promise(r=>setTimeout(r,2000));
  }

  log("DONE ✅","green");
  loadHistory();
  loadAccounts();
}

// auto load
loadHistory();
loadAccounts();
setInterval(loadAccounts,5000);

</script>
</body>
</html>
